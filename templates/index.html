<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        linkedin: {
                            DEFAULT: '#0a66c2',
                            hover: '#004182',
                        }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Custom scrollbar for the table */
        .table-container::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        .table-container::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 4px;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased min-h-screen flex flex-col">

<nav class="bg-white border-b border-slate-200 shadow-sm">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16 items-center">
            <div class="flex items-center gap-3">
                <div class="bg-linkedin text-white p-2 rounded">
                    <i class="fa-brands fa-linkedin-in text-xl"></i>
                </div>
                <span class="font-bold text-xl text-slate-900">Auto Applier Dashboard</span>
            </div>
            <div class="flex items-center gap-4">
                    <span class="text-sm font-medium text-slate-500 bg-slate-100 px-3 py-1 rounded-full border border-slate-200">
                        <i class="fa-solid fa-circle text-green-500 text-xs mr-1 animate-pulse"></i> Service Active
                    </span>
            </div>
        </div>
    </div>
</nav>

<main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 flex items-center gap-4">
            <div class="bg-blue-100 text-blue-600 p-4 rounded-lg">
                <i class="fa-solid fa-briefcase text-2xl"></i>
            </div>
            <div>
                <p class="text-sm font-medium text-slate-500">Total Applied</p>
                <h3 class="text-2xl font-bold text-slate-900" id="stat-total">0</h3>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 flex items-center gap-4">
            <div class="bg-green-100 text-green-600 p-4 rounded-lg">
                <i class="fa-solid fa-bolt text-2xl"></i>
            </div>
            <div>
                <p class="text-sm font-medium text-slate-500">Easy Applied</p>
                <h3 class="text-2xl font-bold text-slate-900" id="stat-easy">0</h3>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 flex items-center gap-4">
            <div class="bg-purple-100 text-purple-600 p-4 rounded-lg">
                <i class="fa-solid fa-arrow-up-right-from-square text-2xl"></i>
            </div>
            <div>
                <p class="text-sm font-medium text-slate-500">External Applies</p>
                <h3 class="text-2xl font-bold text-slate-900" id="stat-external">0</h3>
            </div>
        </div>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
        <div class="px-6 py-5 border-b border-slate-200 flex flex-col sm:flex-row justify-between items-center gap-4">
            <h2 class="text-lg font-bold text-slate-800">Application History</h2>
            <div class="relative w-full sm:w-72">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <i class="fa-solid fa-search text-slate-400"></i>
                </div>
                <input type="text" id="searchInput" placeholder="Search by company or title..."
                       class="block w-full pl-10 pr-3 py-2 border border-slate-300 rounded-lg focus:ring-linkedin focus:border-linkedin text-sm">
            </div>
        </div>

        <div class="overflow-x-auto table-container">
            <table class="w-full text-left border-collapse">
                <thead>
                <tr class="bg-slate-50 border-b border-slate-200 text-xs uppercase tracking-wider text-slate-500 font-semibold">
                    <th class="px-6 py-4">Date Applied</th>
                    <th class="px-6 py-4">Role & Company</th>
                    <th class="px-6 py-4">Application Type</th>
                    <th class="px-6 py-4">HR Contact</th>
                    <th class="px-6 py-4 text-right">Action</th>
                </tr>
                </thead>
                <tbody id="tableBody" class="text-sm text-slate-700 divide-y divide-slate-100">
                <tr>
                    <td colspan="5" class="px-6 py-12 text-center text-slate-500">
                        <i class="fa-solid fa-circle-notch fa-spin text-2xl text-linkedin mb-3 block"></i>
                        Loading application data...
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<script>
    let jobsData = [];

    document.addEventListener('DOMContentLoaded', () => {
        fetchJobs();

        // Search filter event listener
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            const filteredJobs = jobsData.filter(job =>
                (job.Company && job.Company.toLowerCase().includes(searchTerm)) ||
                (job.Title && job.Title.toLowerCase().includes(searchTerm))
            );
            renderTable(filteredJobs);
        });
    });

    async function fetchJobs() {
        try {
            const response = await fetch('/applied-jobs');
            if (!response.ok) {
                throw new Error('Failed to fetch data. Is the CSV file empty?');
            }
            const data = await response.json();

            // Reverse data so newest is on top
            jobsData = data.reverse();

            updateStats(jobsData);
            renderTable(jobsData);
        } catch (error) {
            document.getElementById('tableBody').innerHTML = `
                    <tr>
                        <td colspan="5" class="px-6 py-12 text-center text-red-500">
                            <i class="fa-solid fa-triangle-exclamation text-2xl mb-2 block"></i>
                            ${error.message}
                        </td>
                    </tr>
                `;
        }
    }

    function updateStats(data) {
        let easyCount = 0;
        let externalCount = 0;

        data.forEach(job => {
            if (job.External_Job_link && job.External_Job_link.toLowerCase().includes("easy applied")) {
                easyCount++;
            } else {
                externalCount++;
            }
        });

        document.getElementById('stat-total').innerText = data.length;
        document.getElementById('stat-easy').innerText = easyCount;
        document.getElementById('stat-external').innerText = externalCount;
    }

    function renderTable(data) {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';

        if (data.length === 0) {
            tbody.innerHTML = `
                    <tr>
                        <td colspan="5" class="px-6 py-12 text-center text-slate-500">
                            No applications found.
                        </td>
                    </tr>
                `;
            return;
        }

        data.forEach(job => {
            // Determine if Easy Apply or External
            const isEasyApply = job.External_Job_link && job.External_Job_link.toLowerCase().includes("easy applied");
            const badgeClass = isEasyApply
                ? "bg-green-100 text-green-700 border-green-200"
                : "bg-purple-100 text-purple-700 border-purple-200";
            const badgeText = isEasyApply ? "Easy Apply" : "External";

            // Format HR String
            const hrDisplay = (job.HR_Name && job.HR_Name !== "Unknown")
                ? `<a href="${job.HR_Link}" target="_blank" class="text-linkedin hover:underline font-medium"><i class="fa-regular fa-user mr-1"></i>${job.HR_Name}</a>`
                : `<span class="text-slate-400 italic">Not available</span>`;

            // Build Row
            const tr = document.createElement('tr');
            tr.className = "hover:bg-slate-50 transition-colors duration-150";

            tr.innerHTML = `
                    <td class="px-6 py-4 whitespace-nowrap">
                        <div class="text-slate-900 font-medium">${job.Date_Applied ? job.Date_Applied.split(' ')[0] : 'N/A'}</div>
                        <div class="text-xs text-slate-500">${job.Date_Applied ? job.Date_Applied.split(' ')[1] || '' : ''}</div>
                    </td>
                    <td class="px-6 py-4">
                        <div class="font-bold text-slate-800 text-base">${job.Title || 'Unknown Role'}</div>
                        <div class="text-slate-500 text-sm mt-0.5"><i class="fa-regular fa-building mr-1"></i> ${job.Company || 'Unknown Company'}</div>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <span class="px-2.5 py-1 text-xs font-semibold rounded-md border ${badgeClass}">
                            ${badgeText}
                        </span>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        ${hrDisplay}
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-right">
                        <a href="${job.Job_Link}" target="_blank" class="inline-flex items-center justify-center w-8 h-8 rounded-full bg-slate-100 text-slate-600 hover:bg-linkedin hover:text-white transition-colors duration-200" title="View Job Post">
                            <i class="fa-solid fa-arrow-up-right-from-square text-xs"></i>
                        </a>
                    </td>
                `;
            tbody.appendChild(tr);
        });
    }
</script>
</body>
</html>
